<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ireland Golf Trip 2025</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px}
.header{background:#1a1a1a;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:500}
.header p{font-size:12px;opacity:0.6;margin-top:2px}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e6e0;overflow-x:auto}
.tab{padding:11px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom-color:#1a1a1a}
.content{padding:16px 20px;max-width:900px;margin:0 auto}
.section{display:none}
.section.active{display:block}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #e8e6e0}
.card-title{font-size:13px;font-weight:500;margin-bottom:12px;color:#555}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
label{font-size:12px;color:#888;display:block;margin-bottom:4px}
input[type=text],input[type=number],select{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#1a1a1a}
input:focus,select:focus{outline:none;border-color:#1a1a1a}
.btn{font-size:13px;padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;transition:background 0.1s}
.btn:hover{background:#f5f4f0}
.btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-dark:hover{background:#333}
.btn-sm{font-size:12px;padding:5px 12px}
.btn-green{background:#0F6E56;color:#fff;border-color:#0F6E56}
.btn-green:hover{background:#085041}
.metric{background:#f5f4f0;border-radius:8px;padding:12px;text-align:center}
.metric .val{font-size:20px;font-weight:600}
.metric .lbl{font-size:11px;color:#888;margin-top:2px}
.team-block{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:14px}
.player-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0eeea}
.player-row:last-child{border-bottom:none}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.round-pill{font-size:11px;padding:3px 9px;border-radius:20px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#888;white-space:nowrap}
.round-pill.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
/* Hole scoring table */
.hole-table{width:100%;border-collapse:collapse;font-size:12px}
.hole-table th{background:#f5f4f0;padding:6px 5px;text-align:center;font-weight:500;color:#555;border:1px solid #e8e6e0;position:sticky;top:0}
.hole-table td{padding:4px 5px;text-align:center;border:1px solid #e8e6e0;vertical-align:middle}
.hole-table input[type=number]{width:44px;padding:3px 4px;font-size:12px;text-align:center;border:1px solid #ddd;border-radius:4px}
.hole-table input:focus{outline:none;border-color:#1a1a1a;background:#fffbf0}
.hole-num{font-weight:600;background:#f5f4f0;color:#555}
.par-cell{color:#888;font-size:11px}
.skin-win{background:#dcf5e7 !important;color:#0F6E56;font-weight:600}
.skin-carry{background:#fff8dc !important;color:#B87333}
.skin-half{background:#f0f0f0 !important;color:#888}
.stbl-eagle{background:#2563eb;color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}
.stbl-birdie{background:#1a9e5c;color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:11px}
.stbl-par{background:#e8f5e9;color:#0F6E56;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-weight:500;font-size:11px}
.stbl-bogey{color:#888;font-size:12px}
.stbl-zero{color:#e74c3c;font-size:12px}
.nassau-box{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500}
.nassau-up{background:#dcf5e7;color:#0F6E56}
.nassau-down{background:#fde8e8;color:#A32D2D}
.nassau-even{background:#f0eeea;color:#666}
.match-up{background:#dcf5e7;color:#0F6E56;font-weight:700}
.match-down{background:#fde8e8;color:#A32D2D;font-weight:700}
.match-even{background:#f0eeea;color:#666}
.leaderboard-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0eeea}
.leaderboard-row:last-child{border-bottom:none}
.rank{font-size:18px;font-weight:600;width:26px;text-align:center;color:#bbb}
.rank.gold{color:#B87333}
.rank.silver{color:#888}
.hcp-tag{background:#e1f5ee;color:#085041;font-size:11px;padding:1px 6px;border-radius:5px;font-weight:500}
.settle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0eeea;font-size:14px}
.settle-row:last-child{border-bottom:none}
.pos{color:#0F6E56;font-weight:600}
.neg{color:#A32D2D;font-weight:600}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sticky-col{position:sticky;left:0;background:#fff;z-index:1}
.sticky-col-hdr{position:sticky;left:0;background:#f5f4f0;z-index:2}
.game-summary{background:#f5f4f0;border-radius:8px;padding:12px 14px;margin-top:12px}
.game-summary-title{font-size:12px;font-weight:500;color:#555;margin-bottom:8px}
.skins-result-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #e8e6e0}
.skins-result-row:last-child{border-bottom:none}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>&#127922; Ireland Golf Trip 2025</h1>
    <p>July 13–19 &nbsp;·&nbsp; 8 players &nbsp;·&nbsp; 4 roommate teams &nbsp;·&nbsp; 7 links</p>
  </div>
  <div id="headerPot" style="text-align:right;font-size:13px;opacity:0.8"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="go('setup')">Players</button>
  <button class="tab" onclick="go('courses')">Courses</button>
  <button class="tab" onclick="go('scores')">Scores</button>
  <button class="tab" onclick="go('board')">Standings</button>
  <button class="tab" onclick="go('settle')">Settlement</button>
</div>

<div class="content">

<!-- PLAYERS -->
<div id="tab-setup" class="section active">
  <div class="card">
    <div class="card-title">Trip settings</div>
    <div class="grid2" style="margin-bottom:0">
      <div><label>Buy-in per player (€)</label><input type="number" id="buyin" value="200" min="0" oninput="updateMetrics()" /></div>
      <div class="grid4">
        <div class="metric"><div class="val">8</div><div class="lbl">Players</div></div>
        <div class="metric"><div class="val">4</div><div class="lbl">Teams</div></div>
        <div class="metric"><div class="val" id="mPot">€1,600</div><div class="lbl">Pot</div></div>
        <div class="metric"><div class="val">7</div><div class="lbl">Rounds</div></div>
      </div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" id="teamGrid"></div>
  <div style="margin-top:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <button class="btn btn-dark btn-sm" onclick="go('scores')">&#8594; Enter scores</button>
    <span style="font-size:12px;color:#888">Enter Handicap Index (HI) — course handicap calculated automatically per round</span>
  </div>
</div>

<!-- COURSES -->
<div id="tab-courses" class="section">
  <div id="courseCards"></div>
</div>

<!-- SCORES -->
<div id="tab-scores" class="section">
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="roundPicker"></div>
  <div id="scoresContent"></div>
</div>

<!-- STANDINGS -->
<div id="tab-board" class="section">
  <div class="card">
    <div class="card-title">Team standings</div>
    <div id="teamStandings"></div>
  </div>
  <div class="card">
    <div class="card-title">Individual standings</div>
    <div id="playerStandings"></div>
  </div>
</div>

<!-- SETTLEMENT -->
<div id="tab-settle" class="section">
  <div class="card">
    <div class="card-title">Prize pool</div>
    <div class="grid3" id="potGrid"></div>
  </div>
  <div class="card">
    <div class="card-title">Settlement</div>
    <div id="settlements"></div>
  </div>
</div>

</div><!-- /content -->

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const TC=[
  {bg:'#dbeafe',tx:'#1e40af',name:'Blue'},
  {bg:'#d1fae5',tx:'#065f46',name:'Teal'},
  {bg:'#fef3c7',tx:'#92400e',name:'Amber'},
  {bg:'#fce7f3',tx:'#9d174d',name:'Pink'}
];

const COURSES=[
  {name:'The Island',     date:'Jul 13',par:72,rating:75.1,slope:132,
   pars:[4,4,3,4,5,4,4,3,4, 4,4,5,3,4,4,3,4,4],
   si:  [11,7,15,3,13,5,9,17,1, 12,8,16,4,14,6,18,2,10]},
  {name:'Lahinch Old',    date:'Jul 14',par:72,rating:76.6,slope:132,
   pars:[4,5,3,4,5,3,4,4,4, 4,4,4,4,4,3,4,3,5],
   si:  [5,11,17,3,15,13,1,7,9, 8,4,18,12,2,16,6,14,10]},
  {name:'Ballybunion Old',date:'Jul 15',par:71,rating:72.5,slope:131,
   pars:[4,4,3,4,5,5,4,4,3, 4,4,3,4,5,4,3,4,4],
   si:  [9,5,17,1,13,11,3,15,7, 10,2,18,6,14,4,16,8,12]},
  {name:'Dooks',          date:'Jul 16',par:71,rating:72.4,slope:133,
   pars:[4,4,3,4,5,4,4,3,4, 5,4,3,4,4,3,4,5,4],
   si:  [7,3,17,9,13,1,11,15,5, 12,6,18,8,4,16,2,14,10]},
  {name:'Tralee',         date:'Jul 17',par:72,rating:72.3,slope:128,
   pars:[4,4,3,4,4,5,3,4,4, 4,4,3,5,4,3,4,5,4],
   si:  [5,9,15,1,11,13,17,3,7, 6,10,18,12,2,16,4,14,8]},
  {name:'Waterville',     date:'Jul 18',par:72,rating:72.3,slope:123,
   pars:[4,4,3,4,5,3,4,4,5, 4,5,3,4,4,3,4,4,4],
   si:  [11,5,17,7,13,15,3,9,1, 10,4,18,8,14,16,2,6,12]},
  {name:'Portmarnock',    date:'Jul 19',par:72,rating:76.5,slope:132,
   pars:[4,4,4,4,4,5,3,4,4, 4,4,3,4,4,3,4,3,4],
   si:  [11,15,13,1,5,9,17,3,7, 10,8,14,16,2,18,4,12,6]}
];

const FORMATS=[
  {name:'Skins',type:'skins'},
  {name:'Stableford',type:'stableford'},
  {name:'Nassau',type:'nassau'},
  {name:'Modified Stableford',type:'stableford'},
  {name:'Skins + Stableford',type:'skins_stbl'},
  {name:'Stableford',type:'stableford'},
  {name:'Doubles Match Play',type:'matchplay'}
];

let S={
  players:[
    {name:'Player 1',hi:10},{name:'Player 2',hi:14},
    {name:'Player 3',hi:5},{name:'Player 4',hi:18},
    {name:'Player 5',hi:8},{name:'Player 6',hi:22},
    {name:'Player 7',hi:12},{name:'Player 8',hi:6}
  ],
  teams:[[0,1],[2,3],[4,5],[6,7]],
  holes:{}, // key: r${ri}h${hi}p${pi} = gross score
  activeRound:0
};

function courseHcp(pi,ri){
  const c=COURSES[ri],p=S.players[pi];
  return Math.round(p.hi*(c.slope/113)+(c.rating-c.par));
}

// strokes received on a given hole (0 or 1, occasionally 2 if chcp>18)
function strokesOnHole(chcp,si){
  if(chcp<=0) return 0;
  if(chcp<=18) return si<=chcp?1:0;
  return si<=(chcp-18)?2:1; // double allocation
}

function netOnHole(gross,chcp,si){
  return gross - strokesOnHole(chcp,si);
}

function go(id){
  const ids=['setup','courses','scores','board','settle'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',ids[i]===id));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='courses') renderCourses();
  if(id==='scores') renderScoreSection();
  if(id==='board') renderBoard();
  if(id==='settle') renderSettle();
}

function updateMetrics(){
  const b=+document.getElementById('buyin').value||200;
  document.getElementById('mPot').textContent='€'+(b*8).toLocaleString();
  document.getElementById('headerPot').textContent='Buy-in €'+b+' · Pot €'+(b*8);
}

// ── PLAYERS TAB ───────────────────────────────────────────────────────────────
function initTeams(){
  const tg=document.getElementById('teamGrid');
  tg.innerHTML='';
  S.teams.forEach((team,ti)=>{
    const c=TC[ti];
    const d=document.createElement('div');
    d.className='team-block';
    d.innerHTML=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <span class="badge" style="background:${c.bg};color:${c.tx}">Team ${ti+1}</span>
      <span style="font-size:11px;color:#888">Roommates</span>
    </div>`+
    team.map(pi=>`<div class="player-row">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar" style="background:${c.bg};color:${c.tx}" id="av${pi}">${S.players[pi].name.slice(0,2).toUpperCase()}</div>
        <input type="text" value="${S.players[pi].name}" style="border:none;padding:0;font-size:13px;font-weight:500;background:transparent;width:110px" oninput="S.players[${pi}].name=this.value;document.getElementById('av${pi}').textContent=this.value.slice(0,2).toUpperCase()" />
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <span style="font-size:11px;color:#888">HI</span>
        <input type="number" value="${S.players[pi].hi}" min="0" max="54" step="0.1" style="width:52px;font-size:13px;text-align:center" oninput="S.players[${pi}].hi=+this.value" />
      </div>
    </div>`).join('');
    tg.appendChild(d);
  });
  updateMetrics();
}

// ── COURSES TAB ───────────────────────────────────────────────────────────────
function renderCourses(){
  const cc=document.getElementById('courseCards');
  cc.innerHTML='';
  COURSES.forEach((c,ci)=>{
    const d=document.createElement('div');
    d.className='card';
    const hcps=S.players.map((_,pi)=>courseHcp(pi,ci));
    d.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-size:12px;color:#888">Round ${ci+1} · ${c.date} · ${FORMATS[ci].name}</div>
        <div style="font-size:15px;font-weight:600">${c.name}</div>
      </div>
      <div style="text-align:right;font-size:12px;color:#888">Par ${c.par}<br>${c.rating} / ${c.slope}</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${S.players.map((p,pi)=>`<div style="display:flex;align-items:center;gap:5px;background:#f5f4f0;padding:4px 8px;border-radius:6px">
        <span style="font-size:12px">${p.name}</span>
        <span style="font-size:11px;color:#888">HI ${p.hi}</span>
        <span class="hcp-tag">${hcps[pi]}</span>
      </div>`).join('')}
    </div>
    <div style="font-size:11px;color:#aaa;margin-top:8px">Course HCP = HI × (${c.slope}/113) + (${c.rating}−${c.par})</div>`;
    cc.appendChild(d);
  });
}

// ── SCORES TAB ────────────────────────────────────────────────────────────────
function renderScoreSection(){
  const rp=document.getElementById('roundPicker');
  rp.innerHTML=COURSES.map((c,i)=>`<button class="round-pill ${i===S.activeRound?'active':''}" onclick="selRound(${i})">${i+1}. ${c.name.split(' ')[0]}</button>`).join('');
  renderRound(S.activeRound);
}

function selRound(ri){S.activeRound=ri;renderScoreSection();}

function renderRound(ri){
  const c=COURSES[ri];
  const fmt=FORMATS[ri];
  const sc=document.getElementById('scoresContent');
  const isMatchPlay=fmt.type==='matchplay';

  if(isMatchPlay){
    renderMatchPlay(ri,sc);
    return;
  }

  const chcps=S.players.map((_,pi)=>courseHcp(pi,ri));

  let html=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:12px;color:#888">${c.date} · ${fmt.name}</div>
        <div style="font-size:16px;font-weight:600">${c.name}</div>
      </div>
      <button class="btn btn-dark btn-sm" onclick="recalcAndShow(${ri})">&#8635; Recalculate</button>
    </div>
    <div class="scroll-x">
    <table class="hole-table">
      <thead>
        <tr>
          <th class="sticky-col-hdr" style="min-width:90px;text-align:left">Player / HCP</th>`;
  for(let h=0;h<18;h++) html+=`<th>${h<9?'F':'B'}<br>${h+1}</th>`;
  html+=`<th>OUT</th><th>IN</th><th>TOT</th><th>NET</th>`;
  if(fmt.type==='stableford'||fmt.type==='skins_stbl') html+=`<th>STBL</th>`;
  html+=`</tr>
        <tr>
          <td class="sticky-col" style="font-size:11px;color:#888;padding:4px 5px;background:#f5f4f0">PAR / SI</td>`;
  for(let h=0;h<18;h++) html+=`<td class="par-cell">${c.pars[h]}<br><span style="color:#ccc">${c.si[h]}</span></td>`;
  html+=`<td class="par-cell">${c.pars.slice(0,9).reduce((a,b)=>a+b,0)}</td>
         <td class="par-cell">${c.pars.slice(9).reduce((a,b)=>a+b,0)}</td>
         <td class="par-cell">${c.par}</td><td></td>`;
  if(fmt.type==='stableford'||fmt.type==='skins_stbl') html+=`<td></td>`;
  html+=`</tr></thead><tbody>`;

  S.players.forEach((p,pi)=>{
    const chcp=chcps[pi];
    html+=`<tr>
      <td class="sticky-col" style="text-align:left;padding:4px 6px">
        <div style="font-weight:500">${p.name}</div>
        <div style="font-size:11px;color:#888">HI ${p.hi} → <span class="hcp-tag">${chcp}</span></div>
      </td>`;
    for(let h=0;h<18;h++){
      const key=`r${ri}h${h}p${pi}`;
      const val=S.holes[key]||'';
      html+=`<td><input type="number" min="1" max="15" value="${val}" placeholder="·" data-r="${ri}" data-h="${h}" data-p="${pi}" onchange="holeEntry(this)" style="width:38px" /></td>`;
    }
    // totals
    const gross=calcGross(ri,pi);
    const net=calcNet(ri,pi);
    const stbl=calcStbl(ri,pi);
    html+=`<td id="out_${ri}_${pi}">${gross.out||''}</td>
           <td id="in_${ri}_${pi}">${gross.in||''}</td>
           <td id="tot_${ri}_${pi}">${gross.tot||''}</td>
           <td id="net_${ri}_${pi}">${net||''}</td>`;
    if(fmt.type==='stableford'||fmt.type==='skins_stbl') html+=`<td id="stbl_${ri}_${pi}" style="font-weight:600;color:#0F6E56">${stbl||''}</td>`;
    html+=`</tr>`;
  });

  html+=`</tbody></table></div>`;

  // Game results
  html+=`<div id="gameResults_${ri}"></div>`;
  html+=`</div>`;

  sc.innerHTML=html;
  renderGameResults(ri);
}

function holeEntry(input){
  const ri=+input.dataset.r, h=+input.dataset.h, pi=+input.dataset.p;
  const val=+input.value;
  if(val>0) S.holes[`r${ri}h${h}p${pi}`]=val;
  else delete S.holes[`r${ri}h${h}p${pi}`];
  updatePlayerTotals(ri,pi);
  renderGameResults(ri);
}

function calcGross(ri,pi){
  let out=0,inb=0,hasOut=false,hasIn=false;
  for(let h=0;h<9;h++){const v=S.holes[`r${ri}h${h}p${pi}`];if(v){out+=v;hasOut=true;}}
  for(let h=9;h<18;h++){const v=S.holes[`r${ri}h${h}p${pi}`];if(v){inb+=v;hasIn=true;}}
  const tot=(hasOut||hasIn)?(out+inb):0;
  return{out:hasOut?out:'',in:hasIn?inb:'',tot:tot||''};
}

function calcNet(ri,pi){
  const chcp=courseHcp(pi,ri);
  const c=COURSES[ri];
  let net=0,has=false;
  for(let h=0;h<18;h++){
    const g=S.holes[`r${ri}h${h}p${pi}`];
    if(g){net+=netOnHole(g,chcp,c.si[h]);has=true;}
  }
  return has?net:'';
}

function calcStbl(ri,pi){
  const chcp=courseHcp(pi,ri);
  const c=COURSES[ri];
  let pts=0,has=false;
  for(let h=0;h<18;h++){
    const g=S.holes[`r${ri}h${h}p${pi}`];
    if(g){
      const net=netOnHole(g,chcp,c.si[h]);
      const diff=c.pars[h]-net;
      pts+=Math.max(0,diff+2);
      has=true;
    }
  }
  return has?pts:'';
}

function calcHoleStbl(ri,pi,h){
  const chcp=courseHcp(pi,ri);
  const c=COURSES[ri];
  const g=S.holes[`r${ri}h${h}p${pi}`];
  if(!g) return null;
  const net=netOnHole(g,chcp,c.si[h]);
  const diff=c.pars[h]-net;
  return Math.max(0,diff+2);
}

function updatePlayerTotals(ri,pi){
  const gross=calcGross(ri,pi);
  const net=calcNet(ri,pi);
  const stbl=calcStbl(ri,pi);
  const fmt=FORMATS[ri];
  const elOut=document.getElementById(`out_${ri}_${pi}`);
  const elIn=document.getElementById(`in_${ri}_${pi}`);
  const elTot=document.getElementById(`tot_${ri}_${pi}`);
  const elNet=document.getElementById(`net_${ri}_${pi}`);
  if(elOut) elOut.textContent=gross.out;
  if(elIn) elIn.textContent=gross.in;
  if(elTot) elTot.textContent=gross.tot;
  if(elNet) elNet.textContent=net;
  if(fmt.type==='stableford'||fmt.type==='skins_stbl'){
    const elStbl=document.getElementById(`stbl_${ri}_${pi}`);
    if(elStbl) elStbl.textContent=stbl;
  }
}

function recalcAndShow(ri){
  S.players.forEach((_,pi)=>updatePlayerTotals(ri,pi));
  renderGameResults(ri);
}

function renderGameResults(ri){
  const el=document.getElementById(`gameResults_${ri}`);

function renderSkinsResult(ri){
  const c=COURSES[ri];
  const chcps=S.players.map((_,pi)=>courseHcp(pi,ri));
  let carryover=0;
  let skinRows='';
  let totalSkins=S.players.map(()=>0);
  let carriedSkins=0;

  for(let h=0;h<18;h++){
    const nets=S.players.map((p,pi)=>{
      const g=S.holes[`r${ri}h${h}p${pi}`];
      return g!=null?netOnHole(g,chcps[pi],c.si[h]):null;
    });
    const hasAll=nets.every(n=>n!==null);
    if(!hasAll){
      if(carryover>0) skinRows+=`<div class="skins-result-row"><span>Hole ${h+1}</span><span style="color:#aaa">—</span><span class="badge" style="background:#fff8dc;color:#B87333">Carry ${carryover+1}</span></div>`;
      continue;
    }
    const minNet=Math.min(...nets);
    const winners=nets.map((n,pi)=>n===minNet?pi:-1).filter(x=>x>=0);
    const worth=carryover+1;
    if(winners.length===1){
      const w=winners[0];
      totalSkins[w]+=worth;
      carriedSkins+=worth;
      skinRows+=`<div class="skins-result-row"><span>Hole ${h+1} (${worth} skin${worth>1?'s':''})</span><span><strong>${S.players[w].name}</strong> — net ${minNet}</span><span class="badge" style="background:#d1fae5;color:#065f46">Won</span></div>`;
      carryover=0;
    } else {
      skinRows+=`<div class="skins-result-row"><span>Hole ${h+1}</span><span>${winners.map(w=>S.players[w].name).join(' & ')} tied (net ${minNet})</span><span class="badge" style="background:#fef3c7;color:#92400e">Carry →${carryover+2}</span></div>`;
      carryover++;
    }
  }
  if(carryover>0) skinRows+=`<div class="skins-result-row" style="color:#aaa"><span>Unclaimed skins</span><span colspan="2">${carryover+1} skin${carryover+1>1?'s':''} carried — no winner on last hole</span><span></span></div>`;

  const leaderRow=S.players.map((p,pi)=>({name:p.name,skins:totalSkins[pi]})).filter(x=>x.skins>0).sort((a,b)=>b.skins-a.skins).map(x=>`${x.name}: ${x.skins}`).join(' · ');

  return `<div class="game-summary">
    <div class="game-summary-title">🏌️ Skins — ${carriedSkins} decided${leaderRow?` · ${leaderRow}`:''}</div>
    <div>${skinRows||'<span style="color:#aaa;font-size:13px">Enter gross scores above to see skins results</span>'}</div>
  </div>`;
}

function renderNassauResult(ri){
  const c=COURSES[ri];
  const chcps=S.players.map((_,pi)=>courseHcp(pi,ri));

  // Build pairings: draw all vs all within groups (or just show all 4 pairings across teams)
  // Simple: each team's 2 players play each other team's 2 players — 4 cross-team matchups
  // But Nassau is typically individual; we'll show head-to-head for each unique pairing
  const pairings=[];
  for(let i=0;i<S.players.length;i++){
    for(let j=i+1;j<S.players.length;j++){
      pairings.push([i,j]);
    }
  }

  // For space, show result summary per pairing
  let html='<div class="game-summary"><div class="game-summary-title">🎯 Nassau Results (net, all pairings)</div>';
  html+='<div style="font-size:12px;color:#888;margin-bottom:8px">Front 9 · Back 9 · Overall 18</div>';
  html+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">';
  html+='<thead><tr><th style="text-align:left;padding:4px 6px">Matchup</th><th>F9</th><th>B9</th><th>18</th></tr></thead><tbody>';

  pairings.forEach(([a,b])=>{
    const results=['F9','B9','18'].map((label,li)=>{
      const start=li===1?9:0;
      const end=li===2?18:li===0?9:18;
      let aN=0,bN=0,holes=0;
      for(let h=start;h<end;h++){
        const ga=S.holes[`r${ri}h${h}p${a}`];
        const gb=S.holes[`r${ri}h${h}p${b}`];
        if(ga!=null&&gb!=null){
          aN+=netOnHole(ga,chcps[a],c.si[h]);
          bN+=netOnHole(gb,chcps[b],c.si[h]);
          holes++;
        }
      }
      if(!holes) return '<td style="color:#ccc;text-align:center">—</td>';
      if(aN<bN) return `<td style="text-align:center"><span class="nassau-box nassau-up">${S.players[a].name.split(' ')[0]} W</span></td>`;
      if(bN<aN) return `<td style="text-align:center"><span class="nassau-box nassau-down">${S.players[b].name.split(' ')[0]} W</span></td>`;
      return `<td style="text-align:center"><span class="nassau-box nassau-even">Tied</span></td>`;
    });
    html+=`<tr><td style="padding:4px 6px">${S.players[a].name} vs ${S.players[b].name}</td>${results.join('')}</tr>`;
  });

  html+='</tbody></table></div></div>';
  return html;
}

function renderStablefordResult(ri){
  const rows=S.players.map((p,pi)=>{
    const stbl=calcStbl(ri,pi);
    return {name:p.name,stbl:stbl||0,pi};

  return `<div class="game-summary">
    <div class="game-summary-title">📊 Stableford — net points</div>
    ${rows.map((r,i)=>r.stbl?`<div class="skins-result-row">
      <span>${i+1}. <strong>${r.name}</strong></span>
      <span style="font-weight:600;color:#0F6E56">${r.stbl} pts</span>

}

// ── MATCH PLAY (ROUND 7) ──────────────────────────────────────────────────────
function renderMatchPlay(ri,container){
  const c=COURSES[ri];
  const pairs=S.teams.map((team,ti)=>({
    ti,
    pi0:team[0],pi1:team[1],
    players:[S.players[team[0]],S.players[team[1]]],
    avgHI:(S.players[team[0]].hi+S.players[team[1]].hi)/2,
    color:TC[ti]
  }));

  // Match 1: Team 0 vs Team 1 | Match 2: Team 2 vs Team 3
  const matches=[[pairs[0],pairs[1]],[pairs[2],pairs[3]]];

  let html='';

  matches.forEach((match,mi)=>{
    const [teamA,teamB]=match;
    // Team course hcp = avg HI × (slope/113) + (rating - par), rounded
    const chcpA=Math.round(teamA.avgHI*(c.slope/113)+(c.rating-c.par));
    const chcpB=Math.round(teamB.avgHI*(c.slope/113)+(c.rating-c.par));
    const diff=Math.abs(chcpA-chcpB);
    const higherHcpTeam=chcpA>=chcpB?'A':'B';

    html+=`<div class="card">
      <div style="font-size:12px;color:#888;margin-bottom:6px">${c.date} · ${c.name} · Match ${mi+1} of 2 · Final Day (3× points)</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <div>
            <span class="badge" style="background:${teamA.color.bg};color:${teamA.color.tx}">${teamA.players.map(p=>p.name).join(' & ')}</span>
            <span style="font-size:11px;color:#888;margin-left:6px">Avg HI ${teamA.avgHI.toFixed(1)} → HCP ${chcpA}</span>
          </div>
        </div>
        <div style="font-size:14px;font-weight:600;color:#888">vs</div>
        <div>
          <span class="badge" style="background:${teamB.color.bg};color:${teamB.color.tx}">${teamB.players.map(p=>p.name).join(' & ')}</span>
          <span style="font-size:11px;color:#888;margin-left:6px">Avg HI ${teamB.avgHI.toFixed(1)} → HCP ${chcpB}</span>
        </div>
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:12px">
        ${diff>0?`${higherHcpTeam==='A'?teamA.players.map(p=>p.name).join('&'):teamB.players.map(p=>p.name).join('&')} receive <strong>${diff}</strong> stroke${diff!==1?'s':''} on the ${diff} hardest holes`:'Level match — no strokes given'}
      </div>

      <div class="scroll-x">
      <table class="hole-table">
        <thead>
          <tr>
            <th class="sticky-col-hdr" style="min-width:80px;text-align:left">Hole</th>`;
    for(let h=0;h<18;h++) html+=`<th>${h+1}</th>`;
    html+=`<th>F9</th><th>B9</th><th>STATUS</th></tr>
          <tr>
            <td class="sticky-col" style="background:#f5f4f0;font-size:11px;color:#888;padding:3px 5px">Par / SI</td>`;
    for(let h=0;h<18;h++) html+=`<td class="par-cell">${c.pars[h]}<br><span style="color:#ccc;font-size:10px">${c.si[h]}</span></td>`;
    html+=`<td></td><td></td><td></td></tr>
          <tr>
            <td class="sticky-col" style="background:#f5f4f0;font-size:11px;color:#888;padding:3px 5px">Strokes</td>`;
    for(let h=0;h<18;h++){
      const strokeA=strokesOnHole(chcpA,c.si[h]);
      const strokeB=strokesOnHole(chcpB,c.si[h]);
      const stroke=diff>0?(higherHcpTeam==='A'?strokeA-strokesOnHole(chcpB,c.si[h]):strokeB-strokesOnHole(chcpA,c.si[h])):0;
      html+=`<td style="font-size:10px;color:${stroke>0?'#0F6E56':'#ccc'}">${stroke>0?'+'+stroke:''}</td>`;
    }
    html+=`<td></td><td></td><td></td></tr>
          <tr><td class="sticky-col" style="text-align:left;padding:4px 6px;font-size:12px;font-weight:500;background:#f5f4f0">${teamA.players.map(p=>p.name.split(' ')[0]).join(' & ')}</td>`;
    // Best ball input for Team A (best gross on each hole between the two partners)
    for(let h=0;h<18;h++){
      const key=`r${ri}h${h}m${mi}a`;
      html+=`<td><input type="number" min="1" max="15" value="${S.holes[key]||''}" placeholder="·" data-r="${ri}" data-h="${h}" data-m="${mi}" data-side="a" onchange="mpEntry(this)" style="width:34px" /></td>`;
    }
    html+=`<td id="mp${mi}aF"></td><td id="mp${mi}aB"></td><td rowspan="2" style="vertical-align:middle" id="mp${mi}status"></td></tr>
          <tr><td class="sticky-col" style="text-align:left;padding:4px 6px;font-size:12px;font-weight:500;background:#fff">${teamB.players.map(p=>p.name.split(' ')[0]).join(' & ')}</td>`;
    for(let h=0;h<18;h++){
      const key=`r${ri}h${h}m${mi}b`;
      html+=`<td><input type="number" min="1" max="15" value="${S.holes[key]||''}" placeholder="·" data-r="${ri}" data-h="${h}" data-m="${mi}" data-side="b" onchange="mpEntry(this)" style="width:34px" /></td>`;
    }
    html+=`<td id="mp${mi}bF"></td><td id="mp${mi}bB"></td></tr>
        </tbody></table></div>
      <div id="mp${mi}holeSummary" style="margin-top:12px;font-size:12px;display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>`;
  });

  container.innerHTML=html;
  matches.forEach((_,mi)=>updateMatchStatus(ri,mi,matches[mi]));
}

function mpEntry(input){
  const ri=+input.dataset.r,h=+input.dataset.h,mi=+input.dataset.m,side=input.dataset.side;
  const key=`r${ri}h${h}m${mi}${side}`;
  const val=+input.value;
  if(val>0) S.holes[key]=val;
  else delete S.holes[key];
  const match=[[S.teams.map((t,ti)=>({ti,pi0:t[0],pi1:t[1],players:[S.players[t[0]],S.players[t[1]]],avgHI:(S.players[t[0]].hi+S.players[t[1]].hi)/2,color:TC[ti]}))][0][mi*2],[S.teams.map((t,ti)=>({ti,pi0:t[0],pi1:t[1],players:[S.players[t[0]],S.players[t[1]]],avgHI:(S.players[t[0]].hi+S.players[t[1]].hi)/2,color:TC[ti]}))][0][mi*2+1]];
  updateMatchStatus(ri,mi,match);
}

function updateMatchStatus(ri,mi,match){
  const c=COURSES[ri];
  const [teamA,teamB]=match;
  const chcpA=Math.round(teamA.avgHI*(c.slope/113)+(c.rating-c.par));
  const chcpB=Math.round(teamB.avgHI*(c.slope/113)+(c.rating-c.par));
  const higherHcpTeam=chcpA>=chcpB?'A':'B';

  let aF=0,bF=0,aB=0,bB=0,aFh=0,bFh=0,aBh=0,bBh=0;
  let matchStatus=0; // positive = A up
  let holesPlayed=0;
  let holeSummary=[];

  for(let h=0;h<18;h++){
    const gA=S.holes[`r${ri}h${h}m${mi}a`];
    const gB=S.holes[`r${ri}h${h}m${mi}b`];
    if(gA==null||gB==null) continue;
    holesPlayed++;
    // Net: apply stroke difference to higher hcp team
    const strokeDiff=Math.abs(chcpA-chcpB);
    let netA=gA,netB=gB;
    if(higherHcpTeam==='A') netA=gA-strokesOnHole(strokeDiff,c.si[h]);
    else netB=gB-strokesOnHole(strokeDiff,c.si[h]);

    if(netA<netB){matchStatus++;holeSummary.push({h,winner:'A',net:netA});}
    else if(netB<netA){matchStatus--;holeSummary.push({h,winner:'B',net:netB});}
    else holeSummary.push({h,winner:'H',net:netA});

    if(h<9){aF+=gA;bF+=gB;aFh++;bFh++;}
    else{aB+=gA;bB+=gB;aBh++;bBh++;}
  }

  const elAF=document.getElementById(`mp${mi}aF`);
  const elBF=document.getElementById(`mp${mi}bF`);
  const elAB=document.getElementById(`mp${mi}aB`);
  const elBB=document.getElementById(`mp${mi}bB`);
  if(elAF){elAF.textContent=aFh?aF:'';elBF.textContent=bFh?bF:'';}
  if(elAB){elAB.textContent=aBh?aB:'';elBB.textContent=bBh?bB:'';}

  const elStatus=document.getElementById(`mp${mi}status`);
  if(elStatus&&holesPlayed>0){
    const holesLeft=18-holesPlayed;
    let statusText='',statusClass='match-even';
    if(matchStatus>0){statusText=`${teamA.players.map(p=>p.name.split(' ')[0]).join('/')} ${matchStatus} UP`;statusClass='match-up';}
    else if(matchStatus<0){statusText=`${teamB.players.map(p=>p.name.split(' ')[0]).join('/')} ${Math.abs(matchStatus)} UP`;statusClass='match-down';}
    else statusText='All Square';
    if(holesLeft===0){statusText=matchStatus>0?`${teamA.players.map(p=>p.name.split(' ')[0]).join('/')} WIN`:matchStatus<0?`${teamB.players.map(p=>p.name.split(' ')[0]).join('/')} WIN`:'HALVED';}
    elStatus.innerHTML=`<div style="padding:4px 8px;border-radius:6px;font-size:12px;font-weight:600;text-align:center" class="${statusClass}">${statusText}${holesLeft>0?`<br><span style="font-size:10px;font-weight:400">${holesLeft} to play</span>`:''}</div>`;
  }

  const elHoles=document.getElementById(`mp${mi}holeSummary`);
  if(elHoles){
    elHoles.innerHTML=holeSummary.map(h=>{
      const cls=h.winner==='A'?'nassau-up':h.winner==='B'?'nassau-down':'nassau-even';
      const label=h.winner==='A'?teamA.players.map(p=>p.name.split(' ')[0]).join('/'):h.winner==='B'?teamB.players.map(p=>p.name.split(' ')[0]).join('/'):'H';
      return `<span class="nassau-box ${cls}" style="font-size:11px">H${h.h+1} ${label}</span>`;
    }).join('');
  }
}

// ── BOARD ─────────────────────────────────────────────────────────────────────
function getPlayerStblTotal(pi){
  let t=0;
  for(let ri=0;ri<7;ri++){
    const stbl=calcStbl(ri,pi);
    if(stbl) t+=ri===6?stbl*3:stbl;
  }
  return t;
}

function renderBoard(){
  const teamTotals=S.teams.map((team,ti)=>{
    const pts=team.reduce((a,pi)=>a+getPlayerStblTotal(pi),0);

      <div style="font-size:18px;font-weight:600">${t.pts}<span style="font-size:11px;font-weight:400;color:#888;margin-left:2px">pts</span></div>

  const playerTotals=S.players.map((p,pi)=>({p,pts:getPlayerStblTotal(pi)})).sort((a,b)=>b.pts-a.pts);

        <div style="font-size:14px;font-weight:500">${p.p.name}</div>
        <div style="font-size:11px;color:#888">HI ${p.p.hi}</div>
      </div>
      <div style="font-size:16px;font-weight:600">${p.pts}<span style="font-size:11px;font-weight:400;color:#888;margin-left:2px">pts</span></div>

  <div class="settle-row"><span style="font-weight:500">${teamTotals[1].players.map(p=>p.name).join(' & ')}</span><span class="pos">2nd &nbsp;+€${p2}</span></div>
  <div class="settle-row"><span style="font-weight:500">${teamTotals[2].players.map(p=>p.name).join(' & ')}</span><span class="pos">3rd &nbsp;+€${p3}</span></div>
  <div class="settle-row"><span style="font-weight:500">${teamTotals[3].players.map(p=>p.name).join(' & ')}</span><span class="neg">4th &nbsp;−€${buyin*2}</span></div>
  <div class="settle-row" style="font-size:12px;color:#888;margin-top:4px">
    <span>Skins & Nassau settled on course each round</span><span>€${skinsPot+nassau} total</span>
  </div>`;
}

initTeams();
updateMetrics();
</script>
